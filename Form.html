<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/form.css">
</head>
<body class="d-flex min-vh-100">
    <div id="cuerponuevo" class="container rounded "> <!--Adentro de acá va todo dude-->

        <div class="contenedorformD"> 
        

            <!-- ================= FORMULARIO DE RESERVACIÓN ================= -->
            <div class="formulario-reserva">

            <!-- Campo: Nombre y Apellido -->
            <div class="campo-form">
                <p class="indicacion">Ingrese su nombre y apellido</p>
                <div class="grupo-input">
                <label for="nombre" class="etiqueta">Nombre y Apellido</label>
                <input type="text" id="nombre" placeholder="Escriba aquí..." />
                </div>
            </div>

            <!-- Campo: Email -->
            <div class="campo-form">
                <p class="indicacion">Ingrese su email</p>
                <div class="grupo-input">
                <label for="email" class="etiqueta">Email</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" />
                </div>
            </div>

            <!-- Campo: Fecha -->
            <div class="campo-form campo-pequeño">
                <p class="indicacion">Ingrese su fecha de reservación</p>
                <div class="grupo-input">
                <label for="fecha" class="etiqueta">Fecha</label>
                <input type="date" id="fecha" />
                </div>
            </div>

            <!-- Campo: Hora -->
            <div class="campo-form campo-pequeño">
                <p class="indicacion">Ingrese su hora de reservación</p>
                <div class="grupo-input">
                <label for="hora" class="etiqueta">Hora</label>
                <input type="time" id="hora" />
                </div>
            </div>

            </div>


        </div>







    </div>
<script src="js/form.js"></script>
<script src="js/desarrolladores.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
